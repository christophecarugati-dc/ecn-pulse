name: ECN Pulse scrape

# Runs the ECN scraper every weekday at 04:30 UTC and commits the JSON
# back to the repo as `data/ecn_pulse.json`. From there the Cowork
# artifact fetches it via the raw.githubusercontent.com URL.
#
# Setup:
#   1. Push this repo (the ecn-scraper/ folder) to a public GitHub repo.
#   2. Enable Actions; ensure the workflow has write permissions
#      (Settings → Actions → General → Workflow permissions → read & write).
#   3. The artifact's ECN tab points at the raw JSON URL — update it once.
#
# Cost: zero (free for public repos, generous free tier for private).

on:
  schedule:
    - cron: "30 4 * * 1-5"   # Mon–Fri 04:30 UTC
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit step can rebase before pushing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ECN scraper
        run: |
          mkdir -p data
          python ecn_scraper.py --output data/ecn_pulse.json --max 10

      - name: Run CJEU case linker
        run: |
          python cjeu_scraper.py --output data/court_links.json

      - name: Commit result
        run: |
          git config user.name  "ecn-pulse-bot"
          git config user.email "ecn-pulse-bot@users.noreply.github.com"
          git add data/ecn_pulse.json data/court_links.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh ECN pulse $(date -u +%FT%TZ)"
          # Land the freshly generated data on top of the latest main, retrying
          # on push races (a manual push or another run can move the ref between
          # our checkout and our push). On the rare data-file conflict, keep our
          # just-generated version (--strategy-option=theirs favours the commit
          # being replayed during the rebase).
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected; syncing with remote (attempt $attempt)..."
            git pull --rebase --strategy-option=theirs origin main || git rebase --abort
            sleep 2
          done
          echo "Could not push after 5 attempts." >&2
          exit 1
